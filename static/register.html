<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith Care - 新規登録</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans JP', sans-serif; background: #f8f9fa; color: #191c1d; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48; }
  input:focus { outline: none; border-color: #00478d; box-shadow: 0 0 0 3px rgba(0,71,141,0.15); }
  .btn-primary { background: #00478d; color: #fff; border-radius: 1rem; height: 64px; font-size: 20px; font-weight: 700; width: 100%; transition: transform 120ms; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { background: #c2c6d4; cursor: not-allowed; }
  .error-msg { color: #ba1a1a; font-size: 18px; display: none; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6 py-10">

  <div class="w-full max-w-sm">
    <button onclick="location.href='login.html'" class="flex items-center gap-2 text-[#00478d] mb-6 font-bold text-[18px]">
      <span class="material-symbols-outlined" style="font-size:24px;">arrow_back</span>
      ログインへ戻る
    </button>

    <h1 class="text-[28px] font-bold text-[#00478d] mb-8">新規アカウント登録</h1>

    <div class="bg-white border-2 border-[#c2c6d4] rounded-[1rem] p-8 space-y-6 shadow-sm">
      <div>
        <label class="block text-[18px] font-bold mb-2">お名前</label>
        <input id="name" type="text" autocomplete="name"
          class="w-full border-2 border-[#c2c6d4] rounded-[0.75rem] px-4 h-[56px] text-[20px] transition-all"
          placeholder="山田 花子">
      </div>
      <div>
        <label class="block text-[18px] font-bold mb-2">メールアドレス</label>
        <input id="email" type="email" autocomplete="email"
          class="w-full border-2 border-[#c2c6d4] rounded-[0.75rem] px-4 h-[56px] text-[20px] transition-all"
          placeholder="example@email.com">
      </div>
      <div>
        <label class="block text-[18px] font-bold mb-2">パスワード（6文字以上）</label>
        <input id="password" type="password" autocomplete="new-password"
          class="w-full border-2 border-[#c2c6d4] rounded-[0.75rem] px-4 h-[56px] text-[20px] transition-all"
          placeholder="••••••••">
      </div>

      <p class="error-msg" id="errMsg"></p>
      <button class="btn-primary" id="registerBtn">登録する</button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile }
  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

await import('./config.js').catch(() => {});
const cfg = window.__FIREBASE_CONFIG__;
const app = initializeApp(cfg || {});
const auth = getAuth(app);

const registerBtn = document.getElementById('registerBtn');
const errMsg = document.getElementById('errMsg');

registerBtn.addEventListener('click', async () => {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!name || !email || !password) { show('すべての項目を入力してください'); return; }
  if (password.length < 6) { show('パスワードは6文字以上にしてください'); return; }

  registerBtn.disabled = true; registerBtn.textContent = '登録中…';
  try {
    const { user } = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(user, { displayName: name });
    location.href = 'index.html';
  } catch (e) {
    registerBtn.disabled = false; registerBtn.textContent = '登録する';
    const msgs = {
      'auth/email-already-in-use': 'このメールアドレスは既に使われています',
      'auth/weak-password': 'パスワードが短すぎます（6文字以上）',
      'auth/invalid-email': 'メールアドレスの形式が正しくありません',
    };
    show(msgs[e.code] || '登録に失敗しました');
  }
});

function show(msg) { errMsg.style.display = 'block'; errMsg.textContent = msg; }
</script>
</body>
</html>
